<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechConf 2026 | Sign In & Verify Email</title>
  <meta name="description" content="Sign in or create account with email verification for TechConf 2026">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0066CC;
      --primary-dark: #004999;
      --primary-light: #E6F2FF;
      --secondary: #00A3A3;
      --dark: #1A1A2E;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-900: #111827;
      --success: #059669;
      --error: #DC2626;
      --warning: #F59E0B;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0A0A2A 0%, #1A1A3E 50%, #0A0A2A 100%);
      position: relative;
      overflow-x: hidden;
    }

    /* Conference Background Images Slideshow */
    .bg-slideshow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .bg-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .bg-slide.active {
      opacity: 0.25;
    }

    .bg-slide-1 { background-image: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1920&h=1080&fit=crop'); }
    .bg-slide-2 { background-image: url('https://images.unsplash.com/photo-1505373877841-8d25f7d46678?w=1920&h=1080&fit=crop'); }
    .bg-slide-3 { background-image: url('https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=1920&h=1080&fit=crop'); }
    .bg-slide-4 { background-image: url('https://images.unsplash.com/photo-1475721027785-f74eccf877e2?w=1920&h=1080&fit=crop'); }
    .bg-slide-5 { background-image: url('https://images.unsplash.com/photo-1531058020387-3be344556be6?w=1920&h=1080&fit=crop'); }

    /* Overlay */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 42, 0.85);
      backdrop-filter: blur(3px);
      z-index: 1;
    }

    /* Login Container */
    .login-container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: white;
      border-radius: 48px;
      padding: 3rem;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .tagline {
      text-align: center;
      color: var(--gray-600);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--gray-200);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 1rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--gray-600);
      transition: all 0.3s;
      position: relative;
    }

    .tab.active {
      color: var(--primary);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: var(--gray-700);
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 16px;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }

    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-wrapper input {
      flex: 1;
      padding-right: 3rem;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--gray-600);
      font-size: 1rem;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Verification Section */
    .verification-section {
      background: var(--gray-50);
      border-radius: 20px;
      padding: 1.25rem;
      margin-top: 1rem;
      border: 1px solid var(--gray-200);
      display: none;
    }

    .verification-section.show {
      display: block;
    }

    .code-input-group {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .code-input-group input {
      flex: 1;
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 4px;
      font-weight: 600;
    }

    .verify-btn {
      padding: 0.875rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .resend-link {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--primary);
      cursor: pointer;
      text-align: center;
    }

    .message {
      padding: 0.75rem;
      border-radius: 12px;
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .message.success {
      background: #D1FAE5;
      color: #065F46;
    }

    .message.error {
      background: #FEE2E2;
      color: #991B1B;
    }

    .message.info {
      background: #E0F2FE;
      color: #075985;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--gray-200);
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--gray-600);
    }

    .console-hint {
      background: #1E1E2E;
      color: #00FF00;
      padding: 0.5rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1rem;
    }

    @media (max-width: 640px) {
      .login-card {
        padding: 2rem;
        margin: 1rem;
      }
      .code-input-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="bg-slideshow">
  <div class="bg-slide bg-slide-1 active"></div>
  <div class="bg-slide bg-slide-2"></div>
  <div class="bg-slide bg-slide-3"></div>
  <div class="bg-slide bg-slide-4"></div>
  <div class="bg-slide bg-slide-5"></div>
</div>
<div class="overlay"></div>

<div class="login-container">
  <div class="login-card">
    <div class="logo">TechConf 2026</div>
    <div class="tagline">The Premier Tech Event</div>

    <div class="tabs">
      <div class="tab active" data-tab="login">Sign In</div>
      <div class="tab" data-tab="signup">Create Account</div>
    </div>

    <!-- Login Panel -->
    <div id="loginPanel" class="form-panel active">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="hello@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="loginPassword" placeholder="Enter your password">
          <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
            <i class="fas fa-eye-slash"></i>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="doLoginBtn">Sign In</button>
      <div id="loginMessage" class="message" style="display:none;"></div>
    </div>

    <!-- Signup Panel -->
    <div id="signupPanel" class="form-panel">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Alex Johnson">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="hello@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="signupPassword" placeholder="Create a password (min 6 chars)">
          <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
            <i class="fas fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <!-- Verification Section -->
      <div id="verificationSection" class="verification-section">
        <label><i class="fas fa-key"></i> Verification Code</label>
        <div class="code-input-group">
          <input type="text" id="verificationCode" placeholder="6-digit code" maxlength="6" autocomplete="off">
          <button class="verify-btn" id="verifyCodeBtn">Verify</button>
        </div>
        <div class="resend-link" id="resendCodeBtn">Resend verification code</div>
      </div>

      <button class="btn-primary" id="doSignupBtn">Create Account</button>
      <div id="signupMessage" class="message" style="display:none;"></div>
      <div class="console-hint">
        <i class="fas fa-terminal"></i> Verification code appears in Browser Console (F12)
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-number" id="registeredCount">0</div>
        <div class="stat-label">Registered</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">50+</div>
        <div class="stat-label">Speakers</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">30+</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
  
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCK74_sA2tnd6U957bKKhGlD2GoQqvVJrs",
    authDomain: "tech-conference-2026.firebaseapp.com",
    projectId: "tech-conference-2026",
    storageBucket: "tech-conference-2026.firebasestorage.app",
    messagingSenderId: "339554087189",
    appId: "1:339554087189:web:9908fbcbc5a15bd839391c"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // EmailJS initialization (replace with your key for real emails)
  emailjs.init("YOUR_PUBLIC_KEY_HERE");
  
  // Background slideshow
  let currentSlide = 0;
  const slides = document.querySelectorAll('.bg-slide');
  setInterval(() => {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
  }, 5000);
  
  // User storage
  let users = JSON.parse(localStorage.getItem('techconf_users') || '{}');
  let pendingVerification = null;
  let storedCode = null;
  
  function saveUsers() { localStorage.setItem('techconf_users', JSON.stringify(users)); }
  
  // Update registered count from Firebase
  onSnapshot(collection(db, "registrations"), (snapshot) => {
    document.getElementById('registeredCount').innerText = snapshot.size;
  });
  
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      const panelId = tab.dataset.tab === 'login' ? 'loginPanel' : 'signupPanel';
      document.getElementById(panelId).classList.add('active');
      // Reset verification UI when switching to signup
      if (tab.dataset.tab === 'signup') {
        document.getElementById('verificationSection').classList.remove('show');
        document.getElementById('doSignupBtn').style.display = 'block';
        document.getElementById('signupMessage').style.display = 'none';
      }
    });
  });
  
  // Send verification code
  async function sendVerificationCode(email, name) {
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    storedCode = code;
    pendingVerification = { email, name, password: document.getElementById('signupPassword').value };
    
    // Display in console
    console.log('%c🔐 ========== VERIFICATION CODE ==========', 'background: #0066CC; color: white; font-size: 14px; padding: 4px;');
    console.log(`%c📧 Email: ${email}`, 'color: #60A5FA; font-size: 12px;');
    console.log(`%c🔢 Your 6-digit code: ${code}`, 'background: #059669; color: white; font-size: 16px; font-weight: bold; padding: 6px 12px; border-radius: 6px;');
    console.log('%c==========================================', 'background: #0066CC; color: white; font-size: 14px; padding: 4px;');
    
    const msgDiv = document.getElementById('signupMessage');
    msgDiv.className = 'message info';
    msgDiv.innerHTML = `<i class="fas fa-envelope"></i> Verification code sent! Check console: ${code}`;
    msgDiv.style.display = 'block';
    
    // Attempt real email (uncomment after EmailJS setup)
    /*
    try {
      await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
        to_email: email,
        to_name: name,
        verification_code: code,
        event_name: "TechConf 2026"
      });
      msgDiv.innerHTML = '<i class="fas fa-envelope"></i> Verification code sent to your email!';
    } catch(e) { console.log("EmailJS not configured"); }
    */
    
    return true;
  }
  
  // Signup - Request verification
  document.getElementById('doSignupBtn').addEventListener('click', async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const password = document.getElementById('signupPassword').value;
    const msgDiv = document.getElementById('signupMessage');
    
    if (!name || !email || !password) {
      msgDiv.className = 'message error';
      msgDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> All fields required';
      msgDiv.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      msgDiv.className = 'message error';
      msgDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Password must be at least 6 characters';
      msgDiv.style.display = 'block';
      return;
    }
    if (users[email]) {
      msgDiv.className = 'message error';
      msgDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Email already registered. Please sign in.';
      msgDiv.style.display = 'block';
      return;
    }
    
    await sendVerificationCode(email, name);
    document.getElementById('verificationSection').classList.add('show');
    document.getElementById('doSignupBtn').style.display = 'none';
  });
  
  // Verify code
  document.getElementById('verifyCodeBtn').addEventListener('click', () => {
    const enteredCode = document.getElementById('verificationCode').value.trim();
    const msgDiv = document.getElementById('signupMessage');
    
    if (enteredCode === storedCode && pendingVerification) {
      // Create user account
      users[pendingVerification.email] = {
        name: pendingVerification.name,
        email: pendingVerification.email,
        password: pendingVerification.password,
        verified: true,
        createdAt: new Date().toISOString()
      };
      saveUsers();
      
      // Store session
      const sessionUser = { name: pendingVerification.name, email: pendingVerification.email };
      localStorage.setItem('currentUser', JSON.stringify(sessionUser));
      
      msgDiv.className = 'message success';
      msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> ✓ Account verified! Redirecting to registration...';
      msgDiv.style.display = 'block';
      
      // Redirect to registration page after 1.5 seconds
      setTimeout(() => {
        window.location.href = 'registration.html';
      }, 1500);
    } else {
      msgDiv.className = 'message error';
      msgDiv.innerHTML = '<i class="fas fa-times-circle"></i> Invalid verification code. Please try again.';
      msgDiv.style.display = 'block';
    }
  });
  
  // Resend code
  document.getElementById('resendCodeBtn').addEventListener('click', async () => {
    if (pendingVerification) {
      await sendVerificationCode(pendingVerification.email, pendingVerification.name);
    } else {
      const email = document.getElementById('signupEmail').value.trim().toLowerCase();
      const name = document.getElementById('signupName').value.trim();
      if (email && name) {
        await sendVerificationCode(email, name);
      } else {
        const msgDiv = document.getElementById('signupMessage');
        msgDiv.className = 'message error';
        msgDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Please enter name and email first';
        msgDiv.style.display = 'block';
      }
    }
  });
  
  // Login
  document.getElementById('doLoginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;
    const msgDiv = document.getElementById('loginMessage');
    
    if (!users[email] || users[email].password !== password) {
      msgDiv.className = 'message error';
      msgDiv.innerHTML = '<i class="fas fa-times-circle"></i> Invalid email or password';
      msgDiv.style.display = 'block';
      return;
    }
    
    // Check if user is already registered for event
    const q = query(collection(db, "registrations"), where("email", "==", email));
    const querySnapshot = await getDocs(q);
    const isRegistered = !querySnapshot.empty;
    
    // Store session
    localStorage.setItem('currentUser', JSON.stringify({ name: users[email].name, email }));
    
    msgDiv.className = 'message success';
    msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> Sign in successful! Redirecting...';
    msgDiv.style.display = 'block';
    
    setTimeout(() => {
      window.location.href = 'registration.html';
    }, 1000);
  });
  
  // Check if already logged in
  const savedUser = localStorage.getItem('currentUser');
  if (savedUser) {
    window.location.href = 'registration.html';
  }
  
  // Enter key support
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const activePanel = document.querySelector('.form-panel.active');
        if (activePanel.id === 'loginPanel') {
          document.getElementById('doLoginBtn').click();
        } else if (activePanel.id === 'signupPanel' && document.getElementById('doSignupBtn').style.display !== 'none') {
          document.getElementById('doSignupBtn').click();
        }
      }
    });
  });
</script>

<script>
  // Password visibility toggle (non-module function)
  window.togglePassword = function(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = field.nextElementSibling.querySelector('i');
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    } else {
      field.type = 'password';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    }
  };
</script>
</body>
</html>
